<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillHub — Dashboard</title>
  <link rel="icon" href="../../assets/icons/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../../css/variables.css">
  <link rel="stylesheet" href="../../css/reset.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="../../css/utilities.css">
  <link rel="stylesheet" href="../../css/layout.css">
  <link rel="stylesheet" href="../../css/pages.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar"></aside>
    <div class="sidebar-overlay"></div>
    <div class="main-content">
      <header class="topbar"></header>
      <main class="page-content">
        <div class="page-header">
          <h1 id="welcomeMsg" data-i18n="dashboard.welcome">Welcome back</h1>
          <p data-i18n="dashboard.subtitle">Here's what's happening with your projects.</p>
        </div>

        <div class="grid grid-4 gap-4 mb-8">
          <div class="card">
            <div class="flex justify-between items-center mb-2">
              <span class="text-sm text-secondary" data-i18n="dashboard.total_views">Total Views</span>
              <i class="fas fa-eye text-primary" style="font-size:20px"></i>
            </div>
            <h3 id="statViews" data-counter="12450">0</h3>
            <p class="text-xs text-success mt-1">+14% <span data-i18n="dashboard.this_week">this week</span></p>
          </div>
          <div class="card">
            <div class="flex justify-between items-center mb-2">
              <span class="text-sm text-secondary" data-i18n="dashboard.followers">Followers</span>
              <i class="fas fa-user-plus text-primary" style="font-size:20px"></i>
            </div>
            <h3 data-counter="342">0</h3>
            <p class="text-xs text-success mt-1">+5% <span data-i18n="dashboard.this_week">this week</span></p>
          </div>
          <div class="card">
            <div class="flex justify-between items-center mb-2">
              <span class="text-sm text-secondary" data-i18n="dashboard.total_likes">Total Likes</span>
              <i class="fas fa-heart text-primary" style="font-size:20px"></i>
            </div>
            <h3 data-counter="4890">0</h3>
            <p class="text-xs text-success mt-1">+22% <span data-i18n="dashboard.this_week">this week</span></p>
          </div>
          <div class="card">
            <div class="flex justify-between items-center mb-2">
              <span class="text-sm text-secondary" data-i18n="dashboard.active_projects">Active Projects</span>
              <i class="fas fa-cube text-primary" style="font-size:20px"></i>
            </div>
            <h3 id="statProjects">0</h3>
            <p class="text-xs text-tertiary mt-1">2 pending updates</p>
          </div>
        </div>

        <div class="flex justify-between items-center mb-6">
          <h3 data-i18n="dashboard.recent_projects">Recent Projects</h3>
          <a href="portfolio.html" class="btn btn-ghost btn-sm" data-i18n="dashboard.view_all">View All</a>
        </div>

        <div class="grid grid-3 gap-4" id="projectsGrid"></div>

        <div class="empty-state" id="emptyState" style="display:none">
          <div class="icon">📁</div>
          <h3 data-i18n="dashboard.no_projects">No projects yet</h3>
          <p data-i18n="portfolio.no_projects_desc">Add your first project!</p>
          <a href="portfolio.html" class="btn btn-primary" data-i18n="dashboard.quick_add">Quick Add Project</a>
        </div>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../../js/utils.js"></script>
  <script src="../../js/i18n.js"></script>
  <script src="../../js/supabase.js"></script>
  <script src="../../js/storage-manager.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/ui.js"></script>
  <script src="../../js/nav.js"></script>
  <script src="../../js/pages.js"></script>
  <script>
    (async function() {
      var langs = ['uz','en','ru'];
      for (var i = 0; i < langs.length; i++) {
        var res = await fetch('../../i18n/' + langs[i] + '.json');
        App.i18n.load(langs[i], await res.json());
      }
      App.initSupabase();
      App.auth.init();
      if (!App.auth.requireAuth()) return;

      await App.pages.initLayout({ activePage: 'dashboard', title: App.t('nav.dashboard') });

      var user = App.auth.getCurrentUser();
      var firstName = user ? user.firstName || user.fullName.split(' ')[0] : '';
      document.getElementById('welcomeMsg').textContent = App.t('dashboard.welcome') + ', ' + firstName;

      var allProjects = await App.db.getAllProjects();
      var myProjects = allProjects.filter(function(p) { return p.userId === (user ? user.id : ''); }).slice(0, 6);
      document.getElementById('statProjects').textContent = myProjects.length;

      var grid = document.getElementById('projectsGrid');
      var displayProjects = myProjects.length > 0 ? myProjects : allProjects.slice(0, 6);

      if (displayProjects.length === 0) {
        document.getElementById('emptyState').style.display = '';
        grid.style.display = 'none';
      } else {
        displayProjects.forEach(function(p) {
          var card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = '<div style="height:140px;background:var(--bg-secondary);border-radius:var(--radius-md);margin-bottom:var(--space-4);display:flex;align-items:center;justify-content:center;overflow:hidden">' +
            (p.image ? '<img src="' + p.image + '" style="width:100%;height:100%;object-fit:cover">' : '<i class="fas fa-folder text-tertiary" style="font-size:40px"></i>') +
            '</div><h4 class="mb-2">' + App.utils.sanitize(p.title) + '</h4>' +
            '<p class="text-sm text-secondary line-clamp-2 mb-4">' + App.utils.sanitize(p.description || '') + '</p>' +
            '<div class="flex gap-2 flex-wrap mb-4">' +
            (p.tags || []).map(function(t) { return '<span class="badge badge-primary">' + App.utils.sanitize(t) + '</span>'; }).join('') +
            '</div>' +
            '<div class="flex justify-between items-center text-xs text-tertiary">' +
            '<span><i class="fas fa-eye" style="font-size:14px"></i> ' + (p.views || 0) + '</span>' +
            '<span><i class="fas fa-heart" style="font-size:14px"></i> ' + (p.likes || 0) + '</span>' +
            '</div>';
          grid.appendChild(card);
        });
      }

      document.querySelectorAll('[data-counter]').forEach(function(el) {
        var target = parseInt(el.getAttribute('data-counter'), 10);
        if (target > 0) {
          var observer = new IntersectionObserver(function(entries) {
            entries.forEach(function(entry) {
              if (entry.isIntersecting) { App.utils.animateCounter(el, target, 1500); observer.unobserve(el); }
            });
          }, { threshold: 0.5 });
          observer.observe(el);
        }
      });
    })();
  </script>
</body>
</html>
