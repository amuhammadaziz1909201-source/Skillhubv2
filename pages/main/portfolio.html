<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillHub — Portfolio</title>
  <link rel="icon" href="../../assets/icons/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../../css/variables.css">
  <link rel="stylesheet" href="../../css/reset.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="../../css/utilities.css">
  <link rel="stylesheet" href="../../css/layout.css">
  <link rel="stylesheet" href="../../css/pages.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar"></aside>
    <div class="sidebar-overlay"></div>
    <div class="main-content">
      <header class="topbar"></header>
      <main class="page-content">
        <div class="flex justify-between items-center mb-8">
          <div>
            <h2 data-i18n="portfolio.explore">Explore Projects</h2>
            <p class="text-sm text-secondary mt-1" data-i18n="portfolio.explore_desc">Discover the best work from top developers.</p>
          </div>
          <button class="btn btn-primary" id="addProjectBtn"><i class="fas fa-plus" style="font-size:18px"></i> <span data-i18n="portfolio.add_project">Add Project</span></button>
        </div>

        <div class="tabs mb-6">
          <button class="tab active" data-view="all">All Projects</button>
          <button class="tab" data-view="mine">My Projects</button>
        </div>

        <div class="flex gap-3 mb-6">
          <input class="input" style="max-width:300px" type="search" id="searchInput" placeholder="Search projects...">
          <select class="input" style="width:auto" id="sortSelect">
            <option value="newest">Newest</option>
            <option value="popular">Popular</option>
          </select>
        </div>

        <div class="grid grid-3 gap-4" id="projectsGrid"></div>

        <div class="empty-state" id="emptyState" style="display:none">
          <div class="icon">📁</div>
          <h3 data-i18n="dashboard.no_projects">No projects yet</h3>
          <p data-i18n="portfolio.no_projects_desc">Add your first project!</p>
          <button class="btn btn-primary" onclick="document.getElementById('addProjectBtn').click()" data-i18n="portfolio.add_project">Add Project</button>
        </div>
      </main>
    </div>
  </div>

  <div class="modal-overlay" id="projectModal">
    <div class="modal" style="max-width:540px">
      <h3 class="mb-6" id="modalTitle">Add Project</h3>
      <form id="projectForm" class="flex flex-col gap-5">
        <div class="input-group">
          <label data-i18n="portfolio.title">Title</label>
          <input class="input" type="text" id="pTitle" required>
        </div>
        <div class="input-group">
          <label data-i18n="portfolio.description">Description</label>
          <textarea class="input" id="pDesc" rows="3" style="resize:vertical"></textarea>
        </div>
        <div class="input-group">
          <label data-i18n="portfolio.tags">Tags</label>
          <input class="input" type="text" id="pTags" placeholder="React, Tailwind, Node.js">
        </div>
        <div class="input-group">
          <label><i class="fas fa-image" style="margin-right:4px;font-size:0.85em"></i> Project Image</label>
          <div style="border:2px dashed var(--border);border-radius:var(--radius-md);padding:var(--space-6);text-align:center;cursor:pointer;transition:all var(--transition)" id="imageDropZone" onclick="document.getElementById('pImageFile').click()">
            <div id="imagePreviewArea"><i class="fas fa-cloud-arrow-up" style="font-size:2rem;color:var(--text-tertiary);margin-bottom:var(--space-2)"></i><p class="text-sm text-secondary">Click to upload image</p><p class="text-xs text-tertiary">JPG, PNG. Max 5MB</p></div>
            <img id="imagePreviewImg" style="display:none;max-height:150px;border-radius:var(--radius-md);object-fit:cover;width:100%">
          </div>
          <input type="file" id="pImageFile" accept="image/*" style="display:none">
          <p class="text-xs text-tertiary mt-1">Or paste URL:</p>
          <input class="input" type="url" id="pImage" placeholder="https://..." style="font-size:var(--text-xs)">
        </div>
        <input type="hidden" id="pId">
        <div class="flex gap-3 justify-end">
          <button type="button" class="btn btn-secondary" onclick="App.modal.hide('projectModal')" data-i18n="common.cancel">Cancel</button>
          <button type="submit" class="btn btn-primary" data-i18n="portfolio.save_project">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../../js/utils.js"></script>
  <script src="../../js/i18n.js"></script>
  <script src="../../js/supabase.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/ui.js"></script>
  <script src="../../js/nav.js"></script>
  <script src="../../js/pages.js"></script>
  <script>
    (async function() {
      var langs = ['uz','en','ru'];
      for (var i = 0; i < langs.length; i++) {
        var res = await fetch('../../i18n/' + langs[i] + '.json');
        App.i18n.load(langs[i], await res.json());
      }
      App.initSupabase();
      App.auth.init();
      if (!App.auth.requireAuth()) return;
      await App.pages.initLayout({ activePage: 'portfolio', title: App.t('nav.portfolio') });

      var user = App.auth.getCurrentUser();
      var currentView = 'all';
      var selectedFile = null;

      // Image file preview
      document.getElementById('pImageFile').addEventListener('change', function(e) {
        var file = e.target.files[0];
        if (!file) return;
        if (file.size > 5 * 1024 * 1024) { App.toast('Max 5MB!', 'error'); return; }
        selectedFile = file;
        var reader = new FileReader();
        reader.onload = function(ev) {
          document.getElementById('imagePreviewImg').src = ev.target.result;
          document.getElementById('imagePreviewImg').style.display = 'block';
          document.getElementById('imagePreviewArea').style.display = 'none';
        };
        reader.readAsDataURL(file);
      });

      async function renderProjects() {
        var projects = await App.db.getAllProjects();
        if (currentView === 'mine') {
          projects = projects.filter(function(p) { return p.userId === user.id; });
        }

        var query = document.getElementById('searchInput').value.toLowerCase();
        var sort = document.getElementById('sortSelect').value;

        if (query) {
          projects = projects.filter(function(p) {
            return p.title.toLowerCase().indexOf(query) !== -1 || (p.description||'').toLowerCase().indexOf(query) !== -1 || (p.tags||[]).join(' ').toLowerCase().indexOf(query) !== -1;
          });
        }

        if (sort === 'popular') {
          projects.sort(function(a, b) { return (b.likes || 0) - (a.likes || 0); });
        } else {
          projects.sort(function(a, b) { return new Date(b.createdAt || 0) - new Date(a.createdAt || 0); });
        }

        var grid = document.getElementById('projectsGrid');
        grid.innerHTML = '';

        if (projects.length === 0) {
          document.getElementById('emptyState').style.display = '';
          grid.style.display = 'none';
        } else {
          document.getElementById('emptyState').style.display = 'none';
          grid.style.display = '';
          projects.forEach(function(p) {
            var isOwner = p.userId === user.id;
            var card = document.createElement('div');
            card.className = 'card';
            card.innerHTML =
              '<div style="height:160px;background:var(--bg-secondary);border-radius:var(--radius-md);margin-bottom:var(--space-4);display:flex;align-items:center;justify-content:center;overflow:hidden">' +
              (p.image ? '<img src="' + p.image + '" style="width:100%;height:100%;object-fit:cover">' : '<i class="fas fa-folder text-tertiary" style="font-size:48px"></i>') +
              '</div>' +
              '<h4 class="mb-2">' + App.utils.sanitize(p.title) + '</h4>' +
              '<p class="text-sm text-secondary line-clamp-2 mb-4">' + App.utils.sanitize(p.description || '') + '</p>' +
              '<div class="flex gap-2 flex-wrap mb-4">' +
              (p.tags || []).map(function(t) { return '<span class="badge badge-primary">' + App.utils.sanitize(t) + '</span>'; }).join('') +
              '</div>' +
              '<div class="flex justify-between items-center">' +
              '<div class="flex gap-3 text-xs text-tertiary"><span><i class="fas fa-eye" style="font-size:14px"></i> ' + (p.views||0) + '</span><span><i class="fas fa-heart" style="font-size:14px"></i> ' + (p.likes||0) + '</span></div>' +
              (isOwner ? '<div class="flex gap-2"><button class="btn btn-ghost btn-sm" onclick="editProject(\'' + p.id + '\')"><i class="fas fa-pen" style="font-size:16px"></i></button><button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="deleteProject(\'' + p.id + '\')"><i class="fas fa-trash" style="font-size:16px"></i></button></div>' : '') +
              '</div>';
            grid.appendChild(card);
          });
        }
      }

      document.querySelectorAll('[data-view]').forEach(function(tab) {
        tab.addEventListener('click', function() {
          document.querySelectorAll('[data-view]').forEach(function(t) { t.classList.remove('active'); });
          this.classList.add('active');
          currentView = this.getAttribute('data-view');
          renderProjects();
        });
      });

      document.getElementById('addProjectBtn').addEventListener('click', function() {
        document.getElementById('modalTitle').textContent = App.t('portfolio.add_project');
        document.getElementById('pId').value = '';
        document.getElementById('pTitle').value = '';
        document.getElementById('pDesc').value = '';
        document.getElementById('pTags').value = '';
        document.getElementById('pImage').value = '';
        document.getElementById('pImageFile').value = '';
        document.getElementById('imagePreviewImg').style.display = 'none';
        document.getElementById('imagePreviewArea').style.display = '';
        selectedFile = null;
        App.modal.show('projectModal');
      });

      window.editProject = function(id) {
        var p = App.db.getProjects().find(function(x) { return x.id === id; });
        if (!p) return;
        document.getElementById('modalTitle').textContent = App.t('common.edit');
        document.getElementById('pId').value = p.id;
        document.getElementById('pTitle').value = p.title;
        document.getElementById('pDesc').value = p.description || '';
        document.getElementById('pTags').value = (p.tags || []).join(', ');
        document.getElementById('pImage').value = p.image || '';
        document.getElementById('pImageFile').value = '';
        selectedFile = null;
        if (p.image) {
          document.getElementById('imagePreviewImg').src = p.image;
          document.getElementById('imagePreviewImg').style.display = 'block';
          document.getElementById('imagePreviewArea').style.display = 'none';
        } else {
          document.getElementById('imagePreviewImg').style.display = 'none';
          document.getElementById('imagePreviewArea').style.display = '';
        }
        App.modal.show('projectModal');
      };

      window.deleteProject = async function(id) {
        App.modal.confirm(App.t('portfolio.confirm_delete'), async function() {
          await App.db.deleteProject(id);
          App.toast(App.t('portfolio.removed'), 'success');
          await renderProjects();
        });
      };

      document.getElementById('projectForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        var id = document.getElementById('pId').value;
        var existing = id ? App.db.getProjects().find(function(x){return x.id===id;}) : null;
        var imageUrl = document.getElementById('pImage').value.trim();

        // Upload image if selected
        if (selectedFile && App.isSupabase()) {
          var path = user.id + '/' + Date.now() + '_' + selectedFile.name;
          var upRes = await App.sb.storage.from('project-images').upload(path, selectedFile);
          if (!upRes.error) {
            imageUrl = App.sb.storage.from('project-images').getPublicUrl(path).data.publicUrl;
          }
        } else if (selectedFile) {
          imageUrl = URL.createObjectURL(selectedFile);
        }

        var project = {
          id: id || undefined,
          title: document.getElementById('pTitle').value.trim(),
          description: document.getElementById('pDesc').value.trim(),
          tags: document.getElementById('pTags').value.split(',').map(function(t) { return t.trim(); }).filter(Boolean),
          image: imageUrl,
          userId: user.id,
          views: existing ? existing.views || 0 : 0,
          likes: existing ? existing.likes || 0 : 0,
          createdAt: existing ? existing.createdAt : new Date().toISOString()
        };
        await App.db.saveProject(project);
        App.toast(id ? App.t('portfolio.updated') : App.t('portfolio.added'), 'success');
        App.modal.hide('projectModal');
        selectedFile = null;
        await renderProjects();
      });

      document.getElementById('searchInput').addEventListener('input', App.utils.debounce(renderProjects, 300));
      document.getElementById('sortSelect').addEventListener('change', renderProjects);

      renderProjects();
    })();
  </script>
</body>
</html>
