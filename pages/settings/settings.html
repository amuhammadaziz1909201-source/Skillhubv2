<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillHub — Settings</title>
  <link rel="icon" href="../../assets/icons/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="../../css/variables.css">
  <link rel="stylesheet" href="../../css/reset.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="../../css/utilities.css">
  <link rel="stylesheet" href="../../css/layout.css">
  <link rel="stylesheet" href="../../css/pages.css">
  <style>
    .job-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .job-tag {
      padding: 8px 16px; border-radius: var(--radius-full); font-size: var(--text-sm);
      font-weight: 500; cursor: pointer; border: 1.5px solid var(--border); color: var(--text-secondary);
      transition: all var(--transition); user-select: none; display: flex; align-items: center; gap: 6px;
    }
    .job-tag:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
    .job-tag.selected { background: var(--primary); color: white; border-color: var(--primary); }
    .job-tag.selected:hover { background: var(--primary-hover); }
    .job-tag i { font-size: 0.85em; }
    .skill-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .skill-chip {
      padding: 5px 12px; border-radius: var(--radius-full); font-size: var(--text-xs); font-weight: 500;
      cursor: pointer; border: 1.5px solid var(--border); color: var(--text-secondary);
      transition: all var(--transition); user-select: none;
    }
    .skill-chip:hover { border-color: var(--primary); color: var(--primary); }
    .skill-chip.selected { background: var(--primary-light); color: var(--primary); border-color: var(--primary); font-weight: 600; }
    .skill-chip.selected::before { content: '\f00c '; font-family: 'Font Awesome 6 Free'; font-weight: 900; margin-right: 2px; font-size: 0.8em; }
    #locationMap { height: 250px; border-radius: var(--radius-md); border: 1.5px solid var(--border); margin-top: 8px; z-index: 1; }
    .location-search { display: flex; gap: 8px; }
    .location-search .input { flex: 1; }
    .location-info { display: flex; align-items: center; gap: 8px; margin-top: 8px; padding: 8px 12px; background: var(--bg-secondary); border-radius: var(--radius-md); font-size: var(--text-sm); color: var(--text-secondary); }
    .location-info i { color: var(--primary); }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar"></aside>
    <div class="sidebar-overlay"></div>
    <div class="main-content">
      <header class="topbar"></header>
      <main class="page-content">
        <div class="page-header">
          <h2><i class="fas fa-gear" style="margin-right:8px;font-size:0.85em"></i> Settings</h2>
        </div>

        <div class="tabs mb-8">
          <button class="tab active" data-stab="profile"><i class="fas fa-user" style="margin-right:6px"></i> Profile</button>
          <button class="tab" data-stab="preferences"><i class="fas fa-palette" style="margin-right:6px"></i> Preferences</button>
          <button class="tab" data-stab="security"><i class="fas fa-lock" style="margin-right:6px"></i> Security</button>
        </div>

        <!-- ====== PROFILE TAB ====== -->
        <div id="tab-profile">
          <div class="card mb-6" style="max-width:750px">
            <h3 class="mb-6"><i class="fas fa-user-pen" style="margin-right:8px;font-size:0.9em"></i> Edit Profile</h3>

            <div class="flex gap-6 items-start mb-6 flex-wrap">
              <div style="position:relative">
                <div id="avatarPreview" class="avatar avatar-xl" style="cursor:pointer;border:3px solid var(--border);overflow:hidden"></div>
                <label for="avatarInput" style="position:absolute;bottom:0;right:0;width:32px;height:32px;background:var(--primary);color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:var(--shadow-md);transition:transform 0.2s" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">
                  <i class="fas fa-camera" style="font-size:12px"></i>
                </label>
                <input type="file" id="avatarInput" accept="image/*" style="display:none">
              </div>
              <div style="flex:1;min-width:200px">
                <p class="text-sm text-secondary mb-2">Upload a profile picture</p>
                <p class="text-xs text-tertiary">JPG, PNG or GIF. Max 2MB.</p>
                <button class="btn btn-ghost btn-sm mt-2" id="removeAvatarBtn" style="color:var(--danger);display:none"><i class="fas fa-trash" style="margin-right:4px"></i> Remove</button>
              </div>
            </div>

            <form id="profileForm" class="flex flex-col gap-5">
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-4)">
                <div class="input-group">
                  <label><i class="fas fa-user" style="margin-right:4px;font-size:0.85em"></i> First Name</label>
                  <input class="input" type="text" id="firstName" placeholder="John">
                </div>
                <div class="input-group">
                  <label><i class="fas fa-user" style="margin-right:4px;font-size:0.85em"></i> Last Name</label>
                  <input class="input" type="text" id="lastName" placeholder="Doe">
                </div>
              </div>
              <div class="input-group">
                <label><i class="fas fa-id-card" style="margin-right:4px;font-size:0.85em"></i> Full Name</label>
                <input class="input" type="text" id="fullName" placeholder="John Doe">
              </div>
              <div class="input-group">
                <label><i class="fas fa-align-left" style="margin-right:4px;font-size:0.85em"></i> Bio</label>
                <textarea class="input" id="bio" rows="3" placeholder="Tell us about yourself..." style="resize:vertical"></textarea>
              </div>

              <!-- JOBS -->
              <div class="input-group">
                <label><i class="fas fa-briefcase" style="margin-right:4px;font-size:0.85em"></i> Jobs <span class="text-xs text-tertiary">(select one or more)</span></label>
                <div class="job-tags" id="jobTags"></div>
              </div>

              <!-- SKILLS (dynamic) -->
              <div class="input-group">
                <label><i class="fas fa-code" style="margin-right:4px;font-size:0.85em"></i> Skills <span class="text-xs text-tertiary" id="skillHint">(select jobs first)</span></label>
                <div class="skill-chips" id="skillChips">
                  <p class="text-sm text-tertiary" id="noSkillsMsg">Select your jobs above to see available skills</p>
                </div>
              </div>

              <!-- LOCATION -->
              <div class="input-group">
                <label><i class="fas fa-location-dot" style="margin-right:4px;font-size:0.85em"></i> Location</label>
                <div class="location-search">
                  <input class="input" type="text" id="locationSearch" placeholder="Search city... (e.g. Tashkent)">
                  <button type="button" class="btn btn-secondary" id="searchLocationBtn"><i class="fas fa-search"></i></button>
                  <button type="button" class="btn btn-secondary" id="myLocationBtn" title="Use my location"><i class="fas fa-crosshairs"></i></button>
                </div>
                <div id="locationMap"></div>
                <div class="location-info" id="locationInfo" style="display:none">
                  <i class="fas fa-map-marker-alt"></i>
                  <span id="locationText"></span>
                </div>
                <input type="hidden" id="locationLat">
                <input type="hidden" id="locationLng">
                <input type="hidden" id="locationName">
              </div>

              <div>
                <button type="submit" class="btn btn-primary" id="saveProfileBtn">
                  <i class="fas fa-check"></i> <span>Save Profile</span>
                </button>
              </div>
            </form>
          </div>
        </div>

        <!-- ====== PREFERENCES TAB ====== -->
        <div id="tab-preferences" style="display:none">
          <div class="card" style="max-width:500px">
            <h3 class="mb-6"><i class="fas fa-palette" style="margin-right:8px;font-size:0.9em"></i> Preferences</h3>
            <div class="flex flex-col gap-6">
              <div class="input-group">
                <label><i class="fas fa-language" style="margin-right:4px;font-size:0.85em"></i> Language</label>
                <select class="input" id="langSelect" style="max-width:300px">
                  <option value="uz">O'zbek</option>
                  <option value="en">English</option>
                  <option value="ru">Русский</option>
                </select>
              </div>
              <div class="input-group">
                <label><i class="fas fa-circle-half-stroke" style="margin-right:4px;font-size:0.85em"></i> Theme</label>
                <div class="flex gap-4 items-center">
                  <div class="toggle" id="themeToggle"></div>
                  <span id="themeLabel" class="text-sm"></span>
                </div>
              </div>
              <button class="btn btn-primary" id="savePrefsBtn" style="align-self:flex-start"><i class="fas fa-check"></i> Save</button>
            </div>
          </div>
        </div>

        <!-- ====== SECURITY TAB ====== -->
        <div id="tab-security" style="display:none">
          <div class="card" style="max-width:500px">
            <h3 class="mb-6"><i class="fas fa-shield-halved" style="margin-right:8px;font-size:0.9em"></i> Security</h3>
            <form id="passForm" class="flex flex-col gap-5">
              <div class="input-group">
                <label><i class="fas fa-lock" style="margin-right:4px;font-size:0.85em"></i> New Password</label>
                <input class="input" type="password" id="newPass" placeholder="********" required>
              </div>
              <div class="input-group">
                <label><i class="fas fa-lock" style="margin-right:4px;font-size:0.85em"></i> Confirm Password</label>
                <input class="input" type="password" id="confirmPass" placeholder="********" required>
              </div>
              <button type="submit" class="btn btn-primary"><i class="fas fa-key"></i> Update Password</button>
            </form>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="../../js/utils.js"></script>
  <script src="../../js/i18n.js"></script>
  <script src="../../js/supabase.js"></script>
  <script src="../../js/storage-manager.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/ui.js"></script>
  <script src="../../js/nav.js"></script>
  <script src="../../js/pages.js"></script>
  <script>
    (async function() {
      var langs = ['uz','en','ru'];
      for (var i = 0; i < langs.length; i++) {
        var res = await fetch('../../i18n/' + langs[i] + '.json');
        App.i18n.load(langs[i], await res.json());
      }
      App.initSupabase();
      App.auth.init();
      if (!App.auth.requireAuth()) return;
      await App.pages.initLayout({ activePage: 'settings', title: 'Settings' });

      var user = App.auth.getCurrentUser();
      var avatarUrl = '';
      var selectedJobs = [];
      var selectedSkills = [];
      var map = null;
      var marker = null;

      // ==================== JOBS & SKILLS DATA ====================
      var JOBS_SKILLS = {
        'Frontend Developer': ['HTML', 'CSS', 'JavaScript', 'TypeScript', 'React', 'Vue.js', 'Angular', 'Svelte', 'Next.js', 'Nuxt.js', 'Tailwind CSS', 'Bootstrap', 'SASS/LESS', 'Webpack', 'Vite', 'Responsive Design', 'Accessibility', 'PWA', 'Storybook'],
        'Backend Developer': ['Node.js', 'Express.js', 'Python', 'Django', 'Flask', 'FastAPI', 'Java', 'Spring Boot', 'PHP', 'Laravel', 'Ruby on Rails', 'Go', 'Rust', 'GraphQL', 'REST API', 'WebSocket', 'Microservices', 'gRPC'],
        'Full Stack Developer': ['HTML', 'CSS', 'JavaScript', 'TypeScript', 'React', 'Node.js', 'Express.js', 'Python', 'Django', 'PostgreSQL', 'MongoDB', 'REST API', 'GraphQL', 'Docker', 'Git', 'CI/CD'],
        'UI/UX Designer': ['Figma', 'Adobe XD', 'Sketch', 'Photoshop', 'Illustrator', 'Wireframing', 'Prototyping', 'User Research', 'Usability Testing', 'Design Systems', 'Color Theory', 'Typography', 'Interaction Design', 'Zeplin'],
        'Mobile Developer': ['React Native', 'Flutter', 'Swift', 'Kotlin', 'Dart', 'iOS Development', 'Android Development', 'Firebase', 'Push Notifications', 'App Store Optimization', 'Expo', 'Xamarin'],
        'DevOps Engineer': ['Docker', 'Kubernetes', 'AWS', 'Azure', 'GCP', 'CI/CD', 'Jenkins', 'GitHub Actions', 'Terraform', 'Ansible', 'Linux', 'Nginx', 'Prometheus', 'Grafana', 'Shell Scripting'],
        'Data Scientist': ['Python', 'R', 'SQL', 'Pandas', 'NumPy', 'Scikit-learn', 'TensorFlow', 'PyTorch', 'Matplotlib', 'Seaborn', 'Jupyter', 'Statistics', 'Machine Learning', 'Deep Learning', 'Data Visualization'],
        'Machine Learning Engineer': ['Python', 'TensorFlow', 'PyTorch', 'Scikit-learn', 'Keras', 'NLP', 'Computer Vision', 'Reinforcement Learning', 'MLOps', 'Feature Engineering', 'MLflow', 'Kubeflow'],
        'Cloud Architect': ['AWS', 'Azure', 'GCP', 'Terraform', 'CloudFormation', 'Serverless', 'Lambda', 'EC2', 'S3', 'VPC', 'IAM', 'Cost Optimization', 'Migration', 'High Availability'],
        'Game Developer': ['Unity', 'Unreal Engine', 'C#', 'C++', 'Godot', 'Blender', '3D Modeling', 'Animation', 'Physics', 'Shaders', 'Multiplayer', 'Photon'],
        'QA Engineer': ['Selenium', 'Cypress', 'Jest', 'Playwright', 'Mocha', 'Manual Testing', 'API Testing', 'Performance Testing', 'JMeter', 'Postman', 'Bug Tracking', 'Test Automation'],
        'Cybersecurity Analyst': ['Network Security', 'Penetration Testing', 'SIEM', 'Cryptography', 'Vulnerability Assessment', 'Incident Response', 'OWASP', 'Firewall', 'Wireshark', 'Nmap']
      };

      var JOB_ICONS = {
        'Frontend Developer': 'fa-code',
        'Backend Developer': 'fa-server',
        'Full Stack Developer': 'fa-layer-group',
        'UI/UX Designer': 'fa-palette',
        'Mobile Developer': 'fa-mobile-screen',
        'DevOps Engineer': 'fa-gears',
        'Data Scientist': 'fa-chart-line',
        'Machine Learning Engineer': 'fa-brain',
        'Cloud Architect': 'fa-cloud',
        'Game Developer': 'fa-gamepad',
        'QA Engineer': 'fa-bug',
        'Cybersecurity Analyst': 'fa-shield-halved'
      };

      // ==================== RENDER JOBS ====================
      function renderJobTags() {
        var container = document.getElementById('jobTags');
        container.innerHTML = '';
        Object.keys(JOBS_SKILLS).forEach(function(job) {
          var tag = document.createElement('div');
          tag.className = 'job-tag' + (selectedJobs.indexOf(job) !== -1 ? ' selected' : '');
          tag.innerHTML = '<i class="fas ' + (JOB_ICONS[job] || 'fa-briefcase') + '"></i> ' + job;
          tag.addEventListener('click', function() {
            var idx = selectedJobs.indexOf(job);
            if (idx === -1) { selectedJobs.push(job); }
            else { selectedJobs.splice(idx, 1); }
            renderJobTags();
            renderSkillChips();
          });
          container.appendChild(tag);
        });
      }

      // ==================== RENDER SKILLS ====================
      function renderSkillChips() {
        var container = document.getElementById('skillChips');
        var hint = document.getElementById('skillHint');
        container.innerHTML = '';

        if (selectedJobs.length === 0) {
          container.innerHTML = '<p class="text-sm text-tertiary" id="noSkillsMsg">Select your jobs above to see available skills</p>';
          hint.textContent = '(select jobs first)';
          return;
        }

        var allSkills = [];
        selectedJobs.forEach(function(job) {
          (JOBS_SKILLS[job] || []).forEach(function(s) {
            if (allSkills.indexOf(s) === -1) allSkills.push(s);
          });
        });
        allSkills.sort();
        hint.textContent = '(' + allSkills.length + ' skills available)';

        allSkills.forEach(function(skill) {
          var chip = document.createElement('div');
          chip.className = 'skill-chip' + (selectedSkills.indexOf(skill) !== -1 ? ' selected' : '');
          chip.textContent = skill;
          chip.addEventListener('click', function() {
            var idx = selectedSkills.indexOf(skill);
            if (idx === -1) { selectedSkills.push(skill); }
            else { selectedSkills.splice(idx, 1); }
            this.classList.toggle('selected');
          });
          container.appendChild(chip);
        });
      }

      // ==================== MAP ====================
      function initMap(lat, lng) {
        if (map) { map.remove(); map = null; }
        lat = lat || 41.2995;
        lng = lng || 69.2401;
        map = L.map('locationMap').setView([lat, lng], 10);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '&copy; OpenStreetMap'
        }).addTo(map);
        marker = L.marker([lat, lng], { draggable: true }).addTo(map);
        marker.on('dragend', function(e) {
          var pos = e.target.getLatLng();
          document.getElementById('locationLat').value = pos.lat;
          document.getElementById('locationLng').value = pos.lng;
          reverseGeocode(pos.lat, pos.lng);
        });
        map.on('click', function(e) {
          marker.setLatLng(e.latlng);
          document.getElementById('locationLat').value = e.latlng.lat;
          document.getElementById('locationLng').value = e.latlng.lng;
          reverseGeocode(e.latlng.lat, e.latlng.lng);
        });
        setTimeout(function() { map.invalidateSize(); }, 200);
      }

      async function reverseGeocode(lat, lng) {
        try {
          var res = await fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat=' + lat + '&lon=' + lng);
          var data = await res.json();
          var name = (data.address ? (data.address.city || data.address.town || data.address.village || data.address.state || '') + ', ' + (data.address.country || '') : '');
          name = name.replace(/^,\s*/, '').replace(/,\s*$/, '');
          document.getElementById('locationName').value = name;
          document.getElementById('locationText').textContent = name || lat.toFixed(4) + ', ' + lng.toFixed(4);
          document.getElementById('locationInfo').style.display = '';
        } catch(e) {
          document.getElementById('locationText').textContent = lat.toFixed(4) + ', ' + lng.toFixed(4);
          document.getElementById('locationInfo').style.display = '';
        }
      }

      async function searchLocation(query) {
        try {
          var res = await fetch('https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(query));
          var data = await res.json();
          if (data.length > 0) {
            var r = data[0];
            var lat = parseFloat(r.lat);
            var lng = parseFloat(r.lon);
            map.setView([lat, lng], 12);
            marker.setLatLng([lat, lng]);
            document.getElementById('locationLat').value = lat;
            document.getElementById('locationLng').value = lng;
            document.getElementById('locationName').value = r.display_name.split(',').slice(0, 3).join(',');
            document.getElementById('locationText').textContent = r.display_name.split(',').slice(0, 3).join(',');
            document.getElementById('locationInfo').style.display = '';
          }
        } catch(e) {}
      }

      document.getElementById('searchLocationBtn').addEventListener('click', function() {
        var q = document.getElementById('locationSearch').value.trim();
        if (q) searchLocation(q);
      });
      document.getElementById('locationSearch').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') { e.preventDefault(); searchLocation(this.value.trim()); }
      });
      document.getElementById('myLocationBtn').addEventListener('click', function() {
        if (!navigator.geolocation) { App.toast('Geolocation not supported', 'error'); return; }
        navigator.geolocation.getCurrentPosition(function(pos) {
          var lat = pos.coords.latitude;
          var lng = pos.coords.longitude;
          map.setView([lat, lng], 12);
          marker.setLatLng([lat, lng]);
          document.getElementById('locationLat').value = lat;
          document.getElementById('locationLng').value = lng;
          reverseGeocode(lat, lng);
        }, function() { App.toast('Location access denied', 'error'); });
      });

      // ==================== AVATAR ====================
      function renderAvatar() {
        var el = document.getElementById('avatarPreview');
        var removeBtn = document.getElementById('removeAvatarBtn');
        if (avatarUrl) {
          el.innerHTML = '<img src="' + avatarUrl + '" style="width:100%;height:100%;object-fit:cover">';
          removeBtn.style.display = '';
        } else {
          el.innerHTML = '<i class="fas fa-user" style="font-size:2.5rem;color:var(--primary)"></i>';
          removeBtn.style.display = 'none';
        }
      }

      document.getElementById('avatarInput').addEventListener('change', async function(e) {
        var file = e.target.files[0];
        if (!file) return;
        if (file.size > 2 * 1024 * 1024) { App.toast('Max 2MB!', 'error'); return; }
        if (App.isSupabase()) {
          var ext = file.name.split('.').pop();
          var path = user.id + '/avatar.' + ext;
          var res = await App.sb.storage.from('avatars').upload(path, file, { upsert: true });
          if (res.error) { App.toast('Upload failed', 'error'); return; }
          avatarUrl = App.sb.storage.from('avatars').getPublicUrl(path).data.publicUrl + '?t=' + Date.now();
        } else {
          avatarUrl = URL.createObjectURL(file);
        }
        renderAvatar();
        App.toast('Avatar updated!', 'success');
      });
      document.getElementById('removeAvatarBtn').addEventListener('click', function() {
        avatarUrl = ''; renderAvatar(); document.getElementById('avatarInput').value = '';
      });

      // ==================== LOAD PROFILE ====================
      async function loadProfile() {
        var d;
        if (App.isSupabase()) {
          var res = await App.sb.from('profiles').select('*').eq('id', user.id).single();
          d = res.data || {};
        } else { d = user; }

        document.getElementById('firstName').value = d.first_name || d.firstName || '';
        document.getElementById('lastName').value = d.last_name || d.lastName || '';
        document.getElementById('fullName').value = d.full_name || d.fullName || '';
        document.getElementById('bio').value = d.bio || '';
        avatarUrl = d.avatar || '';
        renderAvatar();

        selectedJobs = d.jobs || (d.job_role ? d.job_role.split(',').map(function(s){return s.trim();}) : []);
        selectedSkills = d.skills || [];
        renderJobTags();
        renderSkillChips();

        var lat = d.location_lat || 41.2995;
        var lng = d.location_lng || 69.2401;
        var locName = d.location || '';
        initMap(lat, lng);
        if (locName) {
          document.getElementById('locationName').value = locName;
          document.getElementById('locationText').textContent = locName;
          document.getElementById('locationInfo').style.display = '';
        }
        document.getElementById('locationLat').value = lat;
        document.getElementById('locationLng').value = lng;
      }

      // ==================== SAVE PROFILE ====================
      document.getElementById('profileForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        var btn = document.getElementById('saveProfileBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner" style="width:16px;height:16px;border-width:2px"></span> Saving...';

        var data = {
          first_name: document.getElementById('firstName').value.trim(),
          last_name: document.getElementById('lastName').value.trim(),
          full_name: document.getElementById('fullName').value.trim(),
          bio: document.getElementById('bio').value.trim(),
          jobs: selectedJobs,
          skills: selectedSkills,
          job_role: selectedJobs.join(', '),
          location: document.getElementById('locationName').value || document.getElementById('locationSearch').value.trim(),
          location_lat: parseFloat(document.getElementById('locationLat').value) || null,
          location_lng: parseFloat(document.getElementById('locationLng').value) || null,
          avatar: avatarUrl
        };

        if (App.isSupabase()) {
          var res = await App.sb.from('profiles').update(data).eq('id', user.id);
          if (res.error) { App.toast('Error: ' + res.error.message, 'error'); btn.disabled = false; btn.innerHTML = '<i class="fas fa-check"></i> Save Profile'; return; }
          await App.sb.auth.updateUser({ data: { full_name: data.full_name, first_name: data.first_name, last_name: data.last_name, avatar: data.avatar, bio: data.bio } });
        }

        Object.assign(user, {
          firstName: data.first_name, lastName: data.last_name, fullName: data.full_name,
          bio: data.bio, jobs: data.jobs, jobRole: data.job_role,
          location: data.location, locationLat: data.location_lat, locationLng: data.location_lng,
          skills: data.skills, avatar: data.avatar
        });
        App.auth.setCurrentUser(user);
        App.db.saveUser(user);

        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-check"></i> Save Profile';
        App.toast('Profile saved!', 'success');
        App.nav.renderSidebar('settings');
      });

      // ==================== TABS ====================
      document.querySelectorAll('[data-stab]').forEach(function(tab) {
        tab.addEventListener('click', function() {
          document.querySelectorAll('[data-stab]').forEach(function(t) { t.classList.remove('active'); });
          this.classList.add('active');
          var id = this.getAttribute('data-stab');
          document.getElementById('tab-profile').style.display = id === 'profile' ? '' : 'none';
          document.getElementById('tab-preferences').style.display = id === 'preferences' ? '' : 'none';
          document.getElementById('tab-security').style.display = id === 'security' ? '' : 'none';
          if (id === 'profile' && map) setTimeout(function() { map.invalidateSize(); }, 100);
        });
      });

      // ==================== PREFERENCES ====================
      document.getElementById('langSelect').value = App.i18n.getLang();
      document.getElementById('langSelect').addEventListener('change', function() {
        App.i18n.setLang(this.value);
        var s = App.db.getSettings(); s.language = this.value; App.db.saveSettings(s);
      });
      var settings = App.db.getSettings();
      var isDark = settings.theme === 'dark';
      var themeToggle = document.getElementById('themeToggle');
      themeToggle.classList.toggle('active', isDark);
      document.getElementById('themeLabel').textContent = isDark ? 'Dark' : 'Light';
      themeToggle.addEventListener('click', function() {
        this.classList.toggle('active');
        var dark = this.classList.contains('active');
        settings.theme = dark ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
        document.getElementById('themeLabel').textContent = dark ? 'Dark' : 'Light';
        App.db.saveSettings(settings);
      });

      // ==================== PASSWORD ====================
      document.getElementById('passForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        var newPass = document.getElementById('newPass').value;
        var confirm = document.getElementById('confirmPass').value;
        if (newPass.length < 8) { App.toast('Min 8 characters', 'error'); return; }
        if (newPass !== confirm) { App.toast('Passwords do not match', 'error'); return; }
        if (App.isSupabase()) {
          var result = await App.sb.auth.updateUser({ password: newPass });
          if (result.error) { App.toast(result.error.message, 'error'); return; }
        }
        App.toast('Password updated!', 'success');
        document.getElementById('newPass').value = '';
        document.getElementById('confirmPass').value = '';
      });

      await loadProfile();
    })();
  </script>
</body>
</html>
