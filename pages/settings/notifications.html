<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillHub — Notifications</title>
  <link rel="icon" href="../../assets/icons/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="../../css/variables.css">
  <link rel="stylesheet" href="../../css/reset.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="../../css/utilities.css">
  <link rel="stylesheet" href="../../css/layout.css">
  <link rel="stylesheet" href="../../css/pages.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar"></aside>
    <div class="sidebar-overlay"></div>
    <div class="main-content">
      <header class="topbar"></header>
      <main class="page-content">
        <div class="flex justify-between items-center mb-8">
          <div>
            <h2 data-i18n="notifications.title">Notifications</h2>
          </div>
          <div class="flex gap-3">
            <button class="btn btn-ghost btn-sm" id="markAllRead" data-i18n="notifications.mark_all_read">Mark all as read</button>
            <button class="btn btn-ghost btn-sm" style="color:var(--danger)" id="clearAll" data-i18n="notifications.clear_all">Clear all</button>
          </div>
        </div>

        <div id="notifList" class="flex flex-col gap-2"></div>

        <div class="empty-state" id="emptyState" style="display:none">
          <div class="icon">🔔</div>
          <h3 data-i18n="notifications.no_notifications">No notifications</h3>
        </div>
      </main>
    </div>
  </div>

  <script src="../../js/utils.js"></script>
  <script src="../../js/i18n.js"></script>
  <script src="../../js/supabase.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/ui.js"></script>
  <script src="../../js/nav.js"></script>
  <script src="../../js/pages.js"></script>
  <script>
    (async function() {
      var langs = ['uz','en','ru'];
      for (var i = 0; i < langs.length; i++) {
        var res = await fetch('../../i18n/' + langs[i] + '.json');
        App.i18n.load(langs[i], await res.json());
      }
      if (!App.auth.requireAuth()) return;
      App.pages.initLayout({ activePage: 'notifications', title: App.t('nav.notifications') });

      function render() {
        var list = App.db.getNotifications();
        var el = document.getElementById('notifList');
        var empty = document.getElementById('emptyState');
        el.innerHTML = '';

        if (list.length === 0) {
          empty.style.display = '';
          return;
        }
        empty.style.display = 'none';

        list.forEach(function(n) {
          var item = document.createElement('div');
          item.className = 'card mb-2 flex gap-4 items-center';
          item.style.opacity = n.read ? '0.6' : '1';
          var iconMap = { info: 'info', warning: 'warning', error: 'error', success: 'check_circle' };
          item.innerHTML =
            '<span class="material-icons" style="color:var(--' + (n.type === 'warning' ? 'warning' : n.type === 'error' ? 'danger' : n.type === 'success' ? 'success' : 'primary') + ')">' + (iconMap[n.type] || 'info') + '</span>' +
            '<div style="flex:1"><p class="text-sm">' + App.utils.sanitize(n.message) + '</p><p class="text-xs text-tertiary mt-1">' + App.utils.timeAgo(n.createdAt) + '</p></div>' +
            (!n.read ? '<div style="width:8px;height:8px;background:var(--primary);border-radius:50%;flex-shrink:0"></div>' : '');
          item.addEventListener('click', function() {
            n.read = true;
            localStorage.setItem('sh_notifications', JSON.stringify(list));
            render();
          });
          el.appendChild(item);
        });
      }

      document.getElementById('markAllRead').addEventListener('click', function() {
        var list = App.db.getNotifications();
        list.forEach(function(n) { n.read = true; });
        localStorage.setItem('sh_notifications', JSON.stringify(list));
        render();
      });

      document.getElementById('clearAll').addEventListener('click', function() {
        localStorage.setItem('sh_notifications', '[]');
        render();
      });

      render();
    })();
  </script>
</body>
</html>
