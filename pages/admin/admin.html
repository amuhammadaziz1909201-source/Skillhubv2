<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillHub — Admin Panel</title>
  <link rel="icon" href="../../assets/icons/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="../../css/variables.css">
  <link rel="stylesheet" href="../../css/reset.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="../../css/utilities.css">
  <link rel="stylesheet" href="../../css/layout.css">
  <link rel="stylesheet" href="../../css/pages.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar"></aside>
    <div class="sidebar-overlay"></div>
    <div class="main-content">
      <header class="topbar"></header>
      <main class="page-content">
        <div class="page-header">
          <h2 data-i18n="admin.title">Admin Panel</h2>
        </div>

        <div class="grid grid-3 gap-4 mb-8">
          <div class="card">
            <div class="flex justify-between items-center mb-2">
              <span class="text-sm text-secondary" data-i18n="admin.total_users">Total Users</span>
              <span class="material-icons text-primary" style="font-size:20px">people</span>
            </div>
            <h3 id="totalUsers">0</h3>
          </div>
          <div class="card">
            <div class="flex justify-between items-center mb-2">
              <span class="text-sm text-secondary" data-i18n="admin.total_projects">Total Projects</span>
              <span class="material-icons text-primary" style="font-size:20px">folder</span>
            </div>
            <h3 id="totalProjects">0</h3>
          </div>
          <div class="card">
            <div class="flex justify-between items-center mb-2">
              <span class="text-sm text-secondary" data-i18n="admin.total_views">Total Views</span>
              <span class="material-icons text-primary" style="font-size:20px">visibility</span>
            </div>
            <h3 id="totalViews">0</h3>
          </div>
        </div>

        <div class="tabs mb-6">
          <button class="tab active" data-atab="users" data-i18n="admin.users">Users</button>
          <button class="tab" data-atab="projects" data-i18n="admin.projects">Projects</button>
        </div>

        <div id="panel-users">
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Email</th>
                  <th data-i18n="admin.role">Role</th>
                  <th data-i18n="admin.joined">Joined</th>
                  <th data-i18n="admin.actions">Actions</th>
                </tr>
              </thead>
              <tbody id="usersTable"></tbody>
            </table>
          </div>
        </div>

        <div id="panel-projects" style="display:none">
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>Title</th>
                  <th>Owner</th>
                  <th>Views</th>
                  <th>Likes</th>
                  <th data-i18n="admin.actions">Actions</th>
                </tr>
              </thead>
              <tbody id="projectsTable"></tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../../js/utils.js"></script>
  <script src="../../js/i18n.js"></script>
  <script src="../../js/supabase.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/ui.js"></script>
  <script src="../../js/nav.js"></script>
  <script src="../../js/pages.js"></script>
  <script>
    (async function() {
      var langs = ['uz','en','ru'];
      for (var i = 0; i < langs.length; i++) {
        var res = await fetch('../../i18n/' + langs[i] + '.json');
        App.i18n.load(langs[i], await res.json());
      }
      if (!App.auth.requireAdmin()) return;
      App.initSupabase();
      App.auth.init();
      App.pages.initLayout({ activePage: 'admin', title: App.t('admin.title') });

      async function renderUsers() {
        var users = await App.db.getProfiles();
        var projects = await App.db.getAllProjects();
        document.getElementById('totalUsers').textContent = users.length;
        document.getElementById('totalProjects').textContent = projects.length;
        document.getElementById('totalViews').textContent = projects.reduce(function(sum, p) { return sum + (p.views || 0); }, 0).toLocaleString();

        var tbody = document.getElementById('usersTable');
        tbody.innerHTML = '';
        users.forEach(function(u) {
          var tr = document.createElement('tr');
          tr.innerHTML =
            '<td><div class="flex items-center gap-3">' +
            '<div class="avatar avatar-sm">' + (u.avatar ? '<img src="' + u.avatar + '">' : App.utils.getInitials(u.fullName)) + '</div>' +
            '<span class="font-semibold">' + App.utils.sanitize(u.fullName) + '</span></div></td>' +
            '<td class="text-secondary">' + App.utils.sanitize(u.email) + '</td>' +
            '<td><span class="badge ' + (u.role === 'admin' ? 'badge-danger' : 'badge-primary') + '">' + (u.role === 'admin' ? App.t('admin.admin') : App.t('admin.user')) + '</span></td>' +
            '<td class="text-secondary text-sm">' + App.utils.formatDate(u.createdAt) + '</td>' +
            '<td><button class="btn btn-ghost btn-sm" style="color:var(--danger)" data-delete-user="' + u.id + '"><span class="material-icons" style="font-size:16px">delete</span></button></td>';
          tbody.appendChild(tr);
        });

        tbody.addEventListener('click', function(e) {
          var btn = e.target.closest('[data-delete-user]');
          if (!btn) return;
          var uid = btn.getAttribute('data-delete-user');
          App.modal.confirm(App.t('admin.confirm_delete_user'), async function() {
            await App.db.deleteProfile(uid);
            await renderUsers();
          });
        });
      }

      async function renderProjects() {
        var projects = await App.db.getAllProjects();
        var users = await App.db.getProfiles();
        var tbody = document.getElementById('projectsTable');
        tbody.innerHTML = '';
        projects.forEach(function(p) {
          var owner = users.find(function(u) { return u.id === p.userId; });
          var tr = document.createElement('tr');
          tr.innerHTML =
            '<td class="font-semibold">' + App.utils.sanitize(p.title) + '</td>' +
            '<td class="text-secondary">' + (owner ? App.utils.sanitize(owner.fullName) : 'Unknown') + '</td>' +
            '<td>' + (p.views || 0) + '</td>' +
            '<td>' + (p.likes || 0) + '</td>' +
            '<td><button class="btn btn-ghost btn-sm" style="color:var(--danger)" data-delete-proj="' + p.id + '"><span class="material-icons" style="font-size:16px">delete</span></button></td>';
          tbody.appendChild(tr);
        });

        tbody.addEventListener('click', async function(e) {
          var btn = e.target.closest('[data-delete-proj]');
          if (!btn) return;
          await App.db.deleteProject(btn.getAttribute('data-delete-proj'));
          await renderProjects();
        });
      }

      document.querySelectorAll('[data-atab]').forEach(function(tab) {
        tab.addEventListener('click', async function() {
          document.querySelectorAll('[data-atab]').forEach(function(t) { t.classList.remove('active'); });
          this.classList.add('active');
          var id = this.getAttribute('data-atab');
          document.getElementById('panel-users').style.display = id === 'users' ? '' : 'none';
          document.getElementById('panel-projects').style.display = id === 'projects' ? '' : 'none';
        });
      });

      await renderUsers();
      await renderProjects();
    })();
  </script>
</body>
</html>
