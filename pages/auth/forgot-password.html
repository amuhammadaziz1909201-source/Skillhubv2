<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillHub — Forgot Password</title>
  <link rel="icon" href="../../assets/icons/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../../css/variables.css">
  <link rel="stylesheet" href="../../css/reset.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="../../css/utilities.css">
  <link rel="stylesheet" href="../../css/pages.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-left">
      <div class="auth-form-wrapper">
        <div class="auth-logo">
          <span style="font-size:1.5rem;font-weight:700;color:var(--primary)">SkillHub</span>
          <span class="badge badge-primary">BETA</span>
        </div>
        <h2 class="auth-form-title" data-i18n="auth.forgot_title">Reset Password</h2>
        <p class="auth-form-subtitle" data-i18n="auth.forgot_desc">Enter your email and we'll send you a reset link.</p>

        <form class="auth-form" id="forgotForm">
          <div class="input-group">
            <label data-i18n="auth.email">Email address</label>
            <input class="input" type="email" id="email" placeholder="example@gmail.com" required>
          </div>
          <div id="successMsg" class="text-success text-sm" style="display:none"></div>
          <div id="errorMsg" class="text-danger text-sm" style="display:none"></div>
          <button type="submit" class="btn btn-primary btn-full btn-lg" data-i18n="auth.send_reset_link">Send reset link</button>
        </form>

        <p class="auth-footer">
          <a href="login.html" class="flex items-center gap-2" data-i18n="auth.back_to_login">
            <i class="fas fa-arrow-left" style="font-size:16px"></i> Back to login
          </a>
        </p>
      </div>
    </div>
    <div class="auth-right">
      <div class="auth-right-content">
        <h2>No worries</h2>
        <p>We'll help you get back into your account in no time.</p>
      </div>
    </div>
  </div>

  <script src="../../js/utils.js"></script>
  <script src="../../js/i18n.js"></script>
  <script src="../../js/supabase.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/ui.js"></script>
  <script src="../../js/pages.js"></script>
  <script>
    (async function() {
      var langs = ['uz','en','ru'];
      for (var i = 0; i < langs.length; i++) {
        var res = await fetch('../../i18n/' + langs[i] + '.json');
        App.i18n.load(langs[i], await res.json());
      }
      App.pages.initAuthPage();

      document.getElementById('forgotForm').addEventListener('submit', function(e) {
        e.preventDefault();
        var email = document.getElementById('email').value.trim();
        if (!email) {
          document.getElementById('errorMsg').textContent = App.t('auth.error.email_required');
          document.getElementById('errorMsg').style.display = 'block';
          return;
        }
        document.getElementById('successMsg').textContent = App.t('auth.reset_sent');
        document.getElementById('successMsg').style.display = 'block';
        document.getElementById('errorMsg').style.display = 'none';
      });
    })();
  </script>
</body>
</html>
