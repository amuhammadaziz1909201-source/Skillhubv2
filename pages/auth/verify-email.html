<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillHub — Verify Email</title>
  <link rel="icon" href="../../assets/icons/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="../../css/variables.css">
  <link rel="stylesheet" href="../../css/reset.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="../../css/utilities.css">
  <link rel="stylesheet" href="../../css/pages.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-left">
      <div class="auth-form-wrapper">
        <div class="auth-logo">
          <span style="font-size:1.5rem;font-weight:700;color:var(--primary)">SkillHub</span>
          <span class="badge badge-primary">BETA</span>
        </div>
        <h2 class="auth-form-title" data-i18n="auth.verify_title">Verify Email</h2>
        <p class="auth-form-subtitle" data-i18n="auth.verify_desc">We sent a verification code to your email.</p>

        <form class="auth-form" id="verifyForm">
          <div class="input-group">
            <label data-i18n="auth.verify_code_label">Verification code</label>
            <input class="input text-center" type="text" id="code" placeholder="000000" maxlength="6" style="font-size:var(--text-2xl);letter-spacing:0.5em;font-weight:700" required>
          </div>
          <div id="errorMsg" class="text-danger text-sm" style="display:none"></div>
          <button type="submit" class="btn btn-primary btn-full btn-lg" data-i18n="auth.verify_btn">Verify</button>
        </form>

        <div class="text-center mt-6">
          <p class="text-sm text-secondary" data-i18n="auth.verify_didnt_receive">Didn't receive the email?</p>
          <button class="btn btn-ghost text-sm mt-2" onclick="App.toast('Code resent!')" data-i18n="auth.verify_resend">Resend code</button>
        </div>

        <p class="auth-footer">
          <a href="login.html" class="flex items-center gap-2" data-i18n="auth.back_to_login">
            <span class="material-icons" style="font-size:16px">arrow_back</span> Back to login
          </a>
        </p>
      </div>
    </div>
    <div class="auth-right">
      <div class="auth-right-content">
        <h2>Almost there</h2>
        <p>Enter the code sent to your email to complete registration.</p>
      </div>
    </div>
  </div>

  <script src="../../js/utils.js"></script>
  <script src="../../js/i18n.js"></script>
  <script src="../../js/supabase.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/ui.js"></script>
  <script src="../../js/pages.js"></script>
  <script>
    (async function() {
      var langs = ['uz','en','ru'];
      for (var i = 0; i < langs.length; i++) {
        var res = await fetch('../../i18n/' + langs[i] + '.json');
        App.i18n.load(langs[i], await res.json());
      }
      App.pages.initAuthPage();

      document.getElementById('verifyForm').addEventListener('submit', function(e) {
        e.preventDefault();
        var code = document.getElementById('code').value.trim();
        if (code.length !== 6) {
          document.getElementById('errorMsg').textContent = 'Enter 6-digit code';
          document.getElementById('errorMsg').style.display = 'block';
          return;
        }
        App.toast(App.t('auth.login_success'), 'success');
        setTimeout(function() { window.location.href = '../main/dashboard.html'; }, 1000);
      });
    })();
  </script>
</body>
</html>
