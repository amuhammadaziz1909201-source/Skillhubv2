<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillHub — Verify Email</title>
  <link rel="icon" href="../../assets/icons/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../../css/variables.css">
  <link rel="stylesheet" href="../../css/reset.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="../../css/utilities.css">
  <link rel="stylesheet" href="../../css/pages.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-left">
      <div class="auth-form-wrapper">
        <div class="auth-logo">
          <span style="font-size:1.5rem;font-weight:700;color:var(--primary)">SkillHub</span>
          <span class="badge badge-primary">BETA</span>
        </div>

        <div id="verifyStep">
          <h2 class="auth-form-title" data-i18n="auth.verify_title">Verify Email</h2>
          <p class="auth-form-subtitle" data-i18n="auth.verify_desc">We sent a verification code to your email.</p>

          <form class="auth-form" id="verifyForm">
            <div class="input-group">
              <label data-i18n="auth.verify_code_label">Verification code</label>
              <input class="input text-center" type="text" id="code" placeholder="000000" maxlength="6" style="font-size:var(--text-2xl);letter-spacing:0.5em;font-weight:700" required>
            </div>
            <div id="errorMsg" class="text-danger text-sm" style="display:none"></div>
            <button type="submit" class="btn btn-primary btn-full btn-lg" id="verifyBtn">
              <span id="verifyText" data-i18n="auth.verify_btn">Verify</span>
              <span id="verifySpinner" class="spinner" style="display:none"></span>
            </button>
          </form>

          <div class="text-center mt-6">
            <p class="text-sm text-secondary" data-i18n="auth.verify_didnt_receive">Didn't receive the email?</p>
            <button class="btn btn-ghost text-sm mt-2" id="resendBtn" data-i18n="auth.verify_resend">Resend code</button>
          </div>
        </div>

        <div id="magicStep" style="display:none">
          <h2 class="auth-form-title">Magic Link</h2>
          <p class="auth-form-subtitle">Or use a magic link to sign in without a password.</p>
          <form class="auth-form" id="magicForm">
            <div class="input-group">
              <label data-i18n="auth.email">Email address</label>
              <input class="input" type="email" id="magicEmail" placeholder="example@gmail.com" required>
            </div>
            <div id="magicMsg" class="text-success text-sm" style="display:none"></div>
            <button type="submit" class="btn btn-primary btn-full btn-lg">Send Magic Link</button>
          </form>
        </div>

        <p class="auth-footer">
          <a href="login.html" class="flex items-center gap-2" data-i18n="auth.back_to_login">
            <i class="fas fa-arrow-left" style="font-size:16px"></i> Back to login
          </a>
        </p>
      </div>
    </div>
    <div class="auth-right">
      <div class="auth-right-content">
        <h2>Almost there</h2>
        <p>Check your email and click the verification link, or enter the code below.</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../../js/utils.js"></script>
  <script src="../../js/i18n.js"></script>
  <script src="../../js/supabase.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/ui.js"></script>
  <script src="../../js/pages.js"></script>
  <script>
    (async function() {
      var langs = ['uz','en','ru'];
      for (var i = 0; i < langs.length; i++) {
        var res = await fetch('../../i18n/' + langs[i] + '.json');
        App.i18n.load(langs[i], await res.json());
      }
      App.initSupabase();
      App.auth.init();
      App.pages.initAuthPage();

      if (App.auth.isLoggedIn()) {
        window.location.href = '../main/dashboard.html';
        return;
      }

      if (!App.isSupabase()) {
        document.getElementById('verifyStep').innerHTML = '<div class="text-center"><h3>Supabase not configured</h3><p class="text-secondary mt-2">Email verification requires Supabase. Set up your project in js/supabase.js</p><a href="login.html" class="btn btn-primary mt-6">Go to Login</a></div>';
        return;
      }

      var verifyForm = document.getElementById('verifyForm');
      var errorMsg = document.getElementById('errorMsg');
      var verifyBtn = document.getElementById('verifyBtn');
      var verifyText = document.getElementById('verifyText');
      var verifySpinner = document.getElementById('verifySpinner');

      function setLoading(loading) {
        verifyBtn.disabled = loading;
        verifyText.style.display = loading ? 'none' : '';
        verifySpinner.style.display = loading ? '' : 'none';
      }

      verifyForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        errorMsg.style.display = 'none';
        setLoading(true);

        var code = document.getElementById('code').value.trim();
        if (code.length !== 6) {
          errorMsg.textContent = 'Enter 6-digit code';
          errorMsg.style.display = 'block';
          setLoading(false);
          return;
        }

        var result = await App.sb.auth.verifyOtp({ token: code, type: 'signup' });
        setLoading(false);

        if (result.error) {
          errorMsg.textContent = result.error.message;
          errorMsg.style.display = 'block';
        } else {
          App.toast(App.t('auth.login_success'), 'success');
          setTimeout(function() { window.location.href = '../main/dashboard.html'; }, 1000);
        }
      });

      document.getElementById('resendBtn').addEventListener('click', async function() {
        var email = prompt('Enter your email:');
        if (!email) return;
        var result = await App.sb.auth.signInWithOtp({ email: email, options: { shouldCreateUser: false } });
        if (result.error) { App.toast(result.error.message, 'error'); }
        else { App.toast('Code resent!', 'success'); }
      });

      var magicForm = document.getElementById('magicForm');
      magicForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        var email = document.getElementById('magicEmail').value.trim();
        var result = await App.sb.auth.signInWithOtp({ email: email });
        if (result.error) { App.toast(result.error.message, 'error'); }
        else {
          document.getElementById('magicMsg').textContent = 'Magic link sent to ' + email;
          document.getElementById('magicMsg').style.display = 'block';
        }
      });
    })();
  </script>
</body>
</html>
