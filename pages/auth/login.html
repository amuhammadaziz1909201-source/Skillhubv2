<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillHub — Sign In</title>
  <link rel="icon" href="../../assets/icons/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="../../css/variables.css">
  <link rel="stylesheet" href="../../css/reset.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="../../css/utilities.css">
  <link rel="stylesheet" href="../../css/pages.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-left">
      <div class="auth-form-wrapper">
        <div class="auth-logo">
          <span style="font-size:1.5rem;font-weight:700;color:var(--primary)">SkillHub</span>
          <span class="badge badge-primary">BETA</span>
        </div>
        <h2 class="auth-form-title" data-i18n="auth.login_title">Welcome back</h2>
        <p class="auth-form-subtitle" data-i18n="auth.login_subtitle">Log in to continue to SkillHub.</p>

        <form class="auth-form" id="loginForm">
          <div class="input-group">
            <label data-i18n="auth.email">Email address</label>
            <input class="input" type="email" id="email" placeholder="example@gmail.com" data-i18n-placeholder="auth.email_placeholder" required>
          </div>
          <div class="input-group">
            <div class="flex justify-between items-center">
              <label data-i18n="auth.password">Password</label>
              <a href="forgot-password.html" class="text-sm text-primary" data-i18n="auth.forgot_password">Forgot password?</a>
            </div>
            <div class="input-with-icon">
              <span class="material-icons icon">lock</span>
              <input class="input" type="password" id="password" placeholder="********" required>
              <span class="material-icons icon-action" id="togglePass" style="cursor:pointer">visibility_off</span>
            </div>
          </div>
          <div id="errorMsg" class="text-danger text-sm" style="display:none"></div>
          <button type="submit" class="btn btn-primary btn-full btn-lg" data-i18n="auth.sign_in">Sign in</button>
        </form>

        <div class="auth-divider mt-6"><span data-i18n="common.or">Or</span></div>

        <button class="auth-social-btn mt-4" onclick="App.toast('Google Sign-In coming soon!')">
          <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          <span data-i18n="auth.continue_google">Continue with Google</span>
        </button>

        <p class="auth-footer">
          <span data-i18n="auth.no_account">Don't have an account?</span>
          <a href="register.html" data-i18n="auth.sign_up">Sign up</a>
        </p>
      </div>
    </div>
    <div class="auth-right">
      <div class="auth-right-content">
        <h2>SkillHub</h2>
        <p>Professional portfolio platform for developers and designers worldwide.</p>
      </div>
    </div>
  </div>

  <script src="../../js/utils.js"></script>
  <script src="../../js/i18n.js"></script>
  <script src="../../js/supabase.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/ui.js"></script>
  <script src="../../js/pages.js"></script>
  <script>
    (async function() {
      var langs = ['uz','en','ru'];
      for (var i = 0; i < langs.length; i++) {
        var res = await fetch('../../i18n/' + langs[i] + '.json');
        App.i18n.load(langs[i], await res.json());
      }
      App.pages.seedDemoData();
      App.pages.initAuthPage();

      if (App.auth.isLoggedIn()) {
        window.location.href = '../main/dashboard.html';
        return;
      }

      var form = document.getElementById('loginForm');
      var errorMsg = document.getElementById('errorMsg');

      form.addEventListener('submit', function(e) {
        e.preventDefault();
        var email = document.getElementById('email').value.trim();
        var password = document.getElementById('password').value;
        var result = App.auth.login(email, password);
        if (result.error) {
          errorMsg.textContent = result.error;
          errorMsg.style.display = 'block';
        } else {
          window.location.href = '../main/dashboard.html';
        }
      });

      document.getElementById('togglePass').addEventListener('click', function() {
        var input = document.getElementById('password');
        if (input.type === 'password') { input.type = 'text'; this.textContent = 'visibility'; }
        else { input.type = 'password'; this.textContent = 'visibility_off'; }
      });
    })();
  </script>
</body>
</html>
