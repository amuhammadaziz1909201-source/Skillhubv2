<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillHub — Sign In</title>
  <link rel="icon" href="../../assets/icons/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="../../css/variables.css">
  <link rel="stylesheet" href="../../css/reset.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="../../css/utilities.css">
  <link rel="stylesheet" href="../../css/pages.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-left">
      <div class="auth-form-wrapper">
        <div class="auth-logo">
          <span style="font-size:1.5rem;font-weight:700;color:var(--primary)">SkillHub</span>
          <span class="badge badge-primary">BETA</span>
        </div>
        <h2 class="auth-form-title" data-i18n="auth.login_title">Welcome back</h2>
        <p class="auth-form-subtitle" data-i18n="auth.login_subtitle">Log in to continue to SkillHub.</p>

        <form class="auth-form" id="loginForm">
          <div class="input-group">
            <label data-i18n="auth.email">Email address</label>
            <input class="input" type="email" id="email" placeholder="example@gmail.com" required>
          </div>
          <div class="input-group">
            <div class="flex justify-between items-center">
              <label data-i18n="auth.password">Password</label>
              <a href="forgot-password.html" class="text-sm text-primary" data-i18n="auth.forgot_password">Forgot password?</a>
            </div>
            <div class="input-with-icon">
              <span class="material-icons icon">lock</span>
              <input class="input" type="password" id="password" placeholder="********" required>
              <span class="material-icons icon-action" id="togglePass" style="cursor:pointer">visibility_off</span>
            </div>
          </div>
          <div id="errorMsg" class="text-danger text-sm" style="display:none"></div>
          <button type="submit" class="btn btn-primary btn-full btn-lg" id="loginBtn">
            <span id="loginText" data-i18n="auth.sign_in">Sign in</span>
            <span id="loginSpinner" class="spinner" style="display:none"></span>
          </button>
        </form>

        <p class="auth-footer">
          <span data-i18n="auth.no_account">Don't have an account?</span>
          <a href="register.html" data-i18n="auth.sign_up">Sign up</a>
        </p>
      </div>
    </div>
    <div class="auth-right">
      <div class="auth-right-content">
        <h2>SkillHub</h2>
        <p>Professional portfolio platform for developers and designers worldwide.</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../../js/utils.js"></script>
  <script src="../../js/i18n.js"></script>
  <script src="../../js/supabase.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/ui.js"></script>
  <script src="../../js/pages.js"></script>
  <script>
    (async function() {
      var langs = ['uz','en','ru'];
      for (var i = 0; i < langs.length; i++) {
        var res = await fetch('../../i18n/' + langs[i] + '.json');
        App.i18n.load(langs[i], await res.json());
      }
      App.initSupabase();
      App.auth.init();
      App.pages.seedDemoData();
      App.pages.initAuthPage();

      if (App.auth.isLoggedIn()) {
        window.location.href = '../main/dashboard.html';
        return;
      }

      var form = document.getElementById('loginForm');
      var errorMsg = document.getElementById('errorMsg');
      var loginBtn = document.getElementById('loginBtn');
      var loginText = document.getElementById('loginText');
      var loginSpinner = document.getElementById('loginSpinner');

      function setLoading(loading) {
        loginBtn.disabled = loading;
        loginText.style.display = loading ? 'none' : '';
        loginSpinner.style.display = loading ? '' : 'none';
      }

      form.addEventListener('submit', async function(e) {
        e.preventDefault();
        errorMsg.style.display = 'none';
        setLoading(true);

        var email = document.getElementById('email').value.trim();
        var password = document.getElementById('password').value;
        var result = await App.auth.login(email, password);

        setLoading(false);
        if (result.error) {
          errorMsg.textContent = result.error;
          errorMsg.style.display = 'block';
        } else {
          window.location.href = '../main/dashboard.html';
        }
      });

      document.getElementById('togglePass').addEventListener('click', function() {
        var input = document.getElementById('password');
        if (input.type === 'password') { input.type = 'text'; this.textContent = 'visibility'; }
        else { input.type = 'password'; this.textContent = 'visibility_off'; }
      });
    })();
  </script>
</body>
</html>
